# Render Blueprint — поднимает ТОЛЬКО веб-сервис (без отдельной базы PostgreSQL,
# т.к. на бесплатном тарифе разрешена лишь одна база на аккаунт, а она уже занята).
# Приложение работает на встроенном SQLite и при старте наполняет себя демо-данными.
services:
  - type: web
    name: remont-calc
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: SECRET_KEY
        generateValue: true
      - key: PRODUCTION
        value: "1"
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
