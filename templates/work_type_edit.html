{% extends "base.html" %}
{% block content %}
<h1>{{ 'Редактирование типа работ' if work_type else 'Новый тип работ' }}</h1>

<form method="post" style="max-width:400px;">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
        <label>Название *</label>
        <input type="text" name="name" required value="{{ work_type.name if work_type else '' }}">
    </div>
    <div class="form-group">
        <label>Единица измерения</label>
        <input type="text" name="unit" value="{{ work_type.unit if work_type else 'м²' }}">
    </div>
    <div class="form-actions">
        <button type="submit" class="btn btn-success"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Сохранить</button>
        <a href="{{ url_for('work_types') }}" class="btn btn-secondary">← Назад</a>
    </div>
</form>
{% endblock %}
