{% extends "base.html" %}
{% block content %}
<h1>{{ '✏️ Редактирование поставщика' if supplier else '➕ Новый поставщик' }}</h1>

<form method="post" style="max-width:500px;">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
        <label>Название *</label>
        <input type="text" name="name" required value="{{ supplier.name if supplier else '' }}">
    </div>
    <div class="form-group">
        <label>Телефон</label>
        <input type="text" name="phone" value="{{ supplier.phone if supplier else '' }}">
    </div>
    <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ supplier.email if supplier else '' }}">
    </div>
    <div class="form-group">
        <label>Адрес</label>
        <input type="text" name="address" value="{{ supplier.address if supplier else '' }}">
    </div>
    <div class="form-actions">
        <button type="submit" class="btn btn-success">💾 Сохранить</button>
        <a href="{{ url_for('suppliers') }}" class="btn btn-secondary">← Назад</a>
    </div>
</form>
{% endblock %}
