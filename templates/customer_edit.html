{% extends "base.html" %}
{% block content %}
<h1>{{ 'Редактирование заказчика' if customer else 'Новый заказчик' }}</h1>

<form method="post" style="max-width:500px;">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
        <label>Имя *</label>
        <input type="text" name="name" required value="{{ customer.name if customer else '' }}">
    </div>
    <div class="form-group">
        <label>Телефон</label>
        <input type="text" name="phone" value="{{ customer.phone if customer else '' }}">
    </div>
    <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ customer.email if customer else '' }}">
    </div>
    <div class="form-group">
        <label>Адрес</label>
        <input type="text" name="address" value="{{ customer.address if customer else '' }}">
    </div>
    <div class="form-actions">
        <button type="submit" class="btn btn-success"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Сохранить</button>
        <a href="{{ url_for('customers') }}" class="btn btn-secondary">← Назад</a>
    </div>
</form>
{% endblock %}
