{% extends "base.html" %}
{% block content %}
<h1>Главная панель</h1>

<div class="stat-grid">
    <div class="stat-card c-projects">
        <div class="num">{{ projects_count }}</div>
        <div class="lbl">Проекты</div>
    </div>
    <div class="stat-card c-materials">
        <div class="num">{{ materials_count }}</div>
        <div class="lbl">Материалы</div>
    </div>
    <div class="stat-card c-contractors">
        <div class="num">{{ contractors_count }}</div>
        <div class="lbl">Подрядчики</div>
    </div>
    <div class="stat-card c-suppliers">
        <div class="num">{{ suppliers_count }}</div>
        <div class="lbl">Поставщики</div>
    </div>
</div>

<h2>Быстрые действия</h2>
<div class="toolbar">
    <a href="{{ url_for('project_edit') }}" class="btn btn-primary">+ Новый проект</a>
    <a href="{{ url_for('projects') }}"     class="btn btn-secondary">Все проекты</a>
    <a href="{{ url_for('materials') }}"    class="btn btn-secondary">Материалы</a>
    <a href="{{ url_for('contractors') }}"  class="btn btn-secondary">Подрядчики</a>
</div>
{% endblock %}
