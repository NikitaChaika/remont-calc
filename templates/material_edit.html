{% extends "base.html" %}
{% block content %}
<h1>{{ '✏️ Редактирование материала' if material else '➕ Новый материал' }}</h1>

<form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-row">
        <div class="form-group">
            <label>Название *</label>
            <input type="text" name="name" required value="{{ material.name if material else '' }}">
        </div>
        <div class="form-group">
            <label>Единица измерения *</label>
            <input type="text" name="unit" required value="{{ material.unit if material else 'шт' }}">
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>Закупочная цена (руб.)</label>
            <input type="number" name="purchase_price" step="0.01" min="0"
                   value="{{ material.purchase_price if material else 0 }}">
        </div>
        <div class="form-group">
            <label>Текущий остаток</label>
            <input type="number" name="current_stock" step="0.01" min="0"
                   value="{{ material.current_stock if material else 0 }}">
        </div>
        <div class="form-group">
            <label>Минимальный остаток</label>
            <input type="number" name="min_stock" step="0.01" min="0"
                   value="{{ material.min_stock if material else 0 }}">
        </div>
    </div>

    <div class="form-group" style="max-width:400px;">
        <label>Поставщик</label>
        <select name="supplier_id">
            <option value="">— не выбран —</option>
            {% for s in suppliers %}
            <option value="{{ s.id }}" {{ 'selected' if material and material.supplier_id == s.id else '' }}>
                {{ s.name }}
            </option>
            {% endfor %}
        </select>
    </div>

    <h2>Привязка к типам работ (норма расхода на м²)</h2>

    <table id="wt-table" style="max-width:600px;">
        <thead>
            <tr><th>Тип работ</th><th>Норма расхода</th><th></th></tr>
        </thead>
        <tbody id="wt-body">
        {% for conn in connections %}
            <tr>
                <td>
                    <select name="work_type_id[]" style="width:100%;padding:5px;">
                        <option value="">—</option>
                        {% for wt in work_types %}
                        <option value="{{ wt.id }}" {{ 'selected' if conn.work_type_id == wt.id else '' }}>{{ wt.name }}</option>
                        {% endfor %}
                    </select>
                </td>
                <td>
                    <input type="number" name="consumption[]" step="0.001" min="0"
                           value="{{ conn.consumption_per_sqm }}" style="width:100%;padding:5px;">
                </td>
                <td><button type="button" class="btn btn-danger" onclick="removeWtRow(this)">🗑️</button></td>
            </tr>
        {% endfor %}
        </tbody>
    </table>

    <div style="margin-top:8px;">
        <button type="button" class="btn btn-secondary" onclick="addWtRow()">➕ Добавить тип работ</button>
    </div>

    <div class="form-actions" style="margin-top:20px;">
        <button type="submit" class="btn btn-success">💾 Сохранить</button>
        <a href="{{ url_for('materials') }}" class="btn btn-secondary">← Назад</a>
    </div>
</form>

<template id="wt-row-template">
    <tr>
        <td>
            <select name="work_type_id[]" style="width:100%;padding:5px;">
                <option value="">—</option>
                {% for wt in work_types %}
                <option value="{{ wt.id }}">{{ wt.name }}</option>
                {% endfor %}
            </select>
        </td>
        <td>
            <input type="number" name="consumption[]" step="0.001" min="0" value="1.0" style="width:100%;padding:5px;">
        </td>
        <td><button type="button" class="btn btn-danger" onclick="removeWtRow(this)">🗑️</button></td>
    </tr>
</template>

<script>
function addWtRow() {
    const tmpl  = document.getElementById('wt-row-template');
    const clone = tmpl.content.cloneNode(true);
    document.getElementById('wt-body').appendChild(clone);
}
function removeWtRow(btn) {
    btn.closest('tr').remove();
}
</script>
{% endblock %}
