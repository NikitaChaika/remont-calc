<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход — Калькулятор ремонтных работ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{--ink:#1E2127;--accent:#A85F22;--accent-hover:#8F4F18;--line:#D7D2C5;--muted:#7C786E;--text:#23262C;--danger-soft:#F6E3E0;}
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter',system-ui,sans-serif;background:var(--ink);
             display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;
             background-image:radial-gradient(circle at 20% 20%,rgba(168,95,34,.18),transparent 42%),radial-gradient(circle at 85% 90%,rgba(58,110,165,.14),transparent 45%);}
        .login-box{background:#fff;padding:40px 38px 34px;border-radius:14px;width:370px;
                   box-shadow:0 20px 60px rgba(0,0,0,.4);}
        .logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:6px}
        .logo .mark{width:34px;height:34px;border-radius:9px;background:var(--accent);color:#fff;
                    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px}
        h1{text-align:center;font-size:17px;font-weight:700;color:var(--ink);margin-bottom:4px}
        .sub{text-align:center;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1.5px;
             text-transform:uppercase;color:var(--muted);margin-bottom:26px}
        label{display:block;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.5px;
              text-transform:uppercase;color:var(--muted);margin-bottom:6px;margin-top:14px}
        input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:8px;font-size:14px;
              font-family:inherit;color:var(--text)}
        input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(168,95,34,.12)}
        button{width:100%;margin-top:24px;padding:12px;background:var(--accent);color:#fff;border:none;
               border-radius:8px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s}
        button:hover{background:var(--accent-hover)}
        .flash{background:var(--danger-soft);color:#8E2E22;padding:11px 14px;border-radius:8px;
               margin-bottom:18px;font-size:13px;border:1px solid #E9C2BB}
    </style>
</head>
<body>
<div class="login-box">
    <div class="logo"><span class="mark">Р</span></div>
    <h1>Калькулятор ремонтных работ</h1>
    <div class="sub">Вход в систему</div>

    {% for _, message in get_flashed_messages(with_categories=True) %}
        <div class="flash">{{ message }}</div>
    {% endfor %}

    <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label>Логин</label>
        <input type="text" name="username" autofocus required>
        <label>Пароль</label>
        <input type="password" name="password" required>
        <button type="submit">Войти</button>
    </form>
</div>
</body>
</html>
